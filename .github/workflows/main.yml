name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: 
      image: ghcr.io/rust-embedded/android-ndk:latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install cargo-apk2
      run: cargo install cargo-apk2
    
    - name: Build APK
      run: cargo apk2 build --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: sni-spoof-apk
        path: target/android-artifacts/release/*.apk
